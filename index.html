        * {

            padding: 0;
            box-sizing: border-box;

        body {

            background: linear-gradient(145deg, #f6f3ff 0%, #eae4fc 100%);
            min-height: 100vh;
            color: #1a1830;
            padding: 1.2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            width: 80vmax;
            height: 80vmax;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(180, 160, 255, 0.3), rgba(140, 200, 255, 0.15));
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 24s infinite alternate ease-in-out;
        }
        .blob1 {
            top: -15vh;
            left: -10vw;
            background: radial-gradient(circle, #cdb4ff40, #a2d2ff20);
        }
        .blob2 {
            bottom: -10vh;
            right: -5vw;
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, #ffc8dd30, #bde0fe30);
            animation-duration: 28s;
            animation-delay: -5s;
        }
        @keyframes floatBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(5%, 8%) scale(1.05);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background: rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 20px 40px -8px rgba(0, 10, 30, 0.12), 0 4px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .logo h1 {
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2a1b4d, #4b367c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }
        .logo span {
            font-weight: 400;
            font-size: 0.8rem;
            color: #4a4a6a;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .telegram-badge {
            background: #1e1e2f;
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 12px 18px -6px rgba(30, 30, 47, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .telegram-badge i {
            font-size: 1.4rem;
            color: #9bb1ff;
        }
        .telegram-badge:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 24px -8px rgba(30, 30, 47, 0.35);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-radius: 32px;
            padding: 1.2rem;
            box-shadow: 0 18px 36px -12px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s cubic-bezier(0.15, 0.75, 0.4, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .product-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 0;
        }
        .product-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 28px 40px -14px #1e1e2f30, 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            border-color: rgba(255, 255, 255, 0.9);
        }
        .product-card:hover::after {
            opacity: 0.5;
        }
        .card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .img-wrapper {
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 1.2rem;
            background: #eaeef9;
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            max-height: 260px;
        }
        .product-card:hover .img-wrapper {
            box-shadow: 0 18px 28px -12px #3b2d6e40;
        }
        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: transform 0.5s ease;
            background: #f0f3fc;
        }
        .product-card:hover .img-wrapper img {
            transform: scale(1.02);
        }

        .product-name {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
            color: #1a1730;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .price {
            background: #1e1e2f;
            padding: 0.25rem 0.9rem;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 6px 10px -4px #1e1e2f60;
            border: 1px solid #ffffff30;
            white-space: nowrap;
        }
        .description {
            color: #2e2e4a;
            line-height: 1.5;
            margin: 0.6rem 0 1.2rem;
            font-weight: 400;
            font-size: 0.9rem;
            flex: 1;
        }

        .action-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: white;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            flex: 1 1 0;
            min-width: 110px;
            color: #1e1e2f;
            text-decoration: none;
        }
        .btn i {
            font-size: 0.95rem;
        }
        .btn-preview {
            background: rgba(240, 242, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .btn-preview:hover {
            background: #e0d9ff;
            box-shadow: 0 10px 18px -8px #6d5f9e;
            border-color: #cbbff0;
        }
        .btn-buy {
            background: #1e1e2f;
            color: white;
            border: 1px solid #ffffff30;
            box-shadow: 0 8px 16px -6px #1e1e2f;

        }
        .btn-buy:hover {
            background: #2d2b4a;
            transform: scale(1.02);
            box-shadow: 0 12px 22px -8px #141322;
        }

        /* ----- MODAL GERAL (preview) ----- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 40, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s ease;
            padding: 1rem;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-card {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 1.5rem 1.5rem 1.8rem;
            box-shadow: 0 40px 60px -16px #00000040;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }
        .active .modal-card {
            transform: scale(1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
        }
        .modal-header h3 {

            font-weight: 700;
            color: #1e1730;
        }

            font-size: 1.8rem;

            color: #3a2e5c;

            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.5);
            transition: background 0.2s;
        }
        .close-modal:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        .modal-body {
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(30, 30, 47, 0.2);
            border-radius: 10px;
        }

        .preview-media {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #15121f10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-media img,
        .preview-media video {
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 24px;
        }

            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid #ffffff30;
        }

        .payment-options {

            flex-direction: column;

            padding: 1rem 1.2rem;

            gap: 1rem;
            font-weight: 600;
            font-size: 1.05rem;
            color: #1a1730;

            text-align: left;

            border-color: #b7a9e0;

            box-shadow: 0 12px 20px -10px rgba(30, 30, 47, 0.15);

            width: 2.2rem;
            text-align: center;

        .payment-option-btn .option-label {

        .back-to-options {

        .footer-wave {

        }

            color: #5f4b8b;
            font-size: 1.2rem;

        @media (max-width: 480px) {
            body {

            .header {
                padding: 1rem 1.2rem;

            }
            .logo h1 {
                font-size: 1.6rem;
            }
            .telegram-badge {
                padding: 0.5rem 1.2rem;

            .btn {
                padding: 0.7rem 0.8rem;
                font-size: 0.85rem;
            }
            .img-wrapper {
                min-height: 150px;
                max-height: 220px;
            }
            .modal-card {
                padding: 1.2rem;
                border-radius: 28px;
            }
            .giftcard-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .payment-option-btn {
                padding: 0.8rem 1rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

            const previewContent = document.getElementById('previewContent');
            const closePreview = document.getElementById('closePreviewBtn');

                if (!data || !data.url) return;
                previewTitle.textContent = data.name || 'Preview';
                previewContent.innerHTML = '';
                const url = data.url;
                if (isVideoUrl(url)) {
                    const video = document.createElement('video');
                    video.src = url;
                    video.controls = true;
                    video.autoplay = true;
                    video.muted = false;
                    video.loop = false;
                    video.style.width = '100%';
                    video.style.borderRadius = '24px';
                    previewContent.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = data.name || 'Preview';
                    img.loading = 'lazy';
                    img.onerror = () => {
                        img.src =
                            'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22 viewBox=%220 0 400 300%22%3E%3Crect width=%22400%22 height=%22300%22 fill=%22%23eaeef9%22/%3E%3Ctext x=%2220%22 y=%22150%22 font-family=%22Inter%22 font-size=%2216%22 fill=%22%234a4566%22%3EPreview not available%3C/text%3E%3C/svg%3E';

                    previewContent.appendChild(img);
                }
                previewModal.classList.add('active');
                document.body.style.overflow = 'hidden';

                }

            // --------------------------------------------------------------

            document.addEventListener('click', function(e) {
                // Preview
                const previewBtn = e.target.closest('.btn-preview');
                if (previewBtn) {
                    e.preventDefault();
                    const dataAttr = previewBtn.getAttribute('data-preview');
                    if (dataAttr) {
                        try { openPreview(JSON.parse(dataAttr)); } catch (_) {}
                    }
                    return;
                }

                // Buy
                const buyBtn = e.target.closest('.btn-buy');
                if (buyBtn) {
                    e.preventDefault();
                    const dataAttr = buyBtn.getAttribute('data-buy');
                    if (dataAttr) {
                        try {

                            const fullProduct = products.find(p => p.id === prodData.id);

                    return;

                if (e.target === previewModal) closePreviewModal();
                if (e.target === buyModal) closeBuyModal();
            });

            // fechar com ESC

                if (e.key === 'Escape') {
                    if (previewModal.classList.contains('active')) closePreviewModal();
                    if (buyModal.classList.contains('active')) closeBuyModal();

            closePreview.addEventListener('click', closePreviewModal);
            closeBuyBtn.addEventListener('click', closeBuyModal);
