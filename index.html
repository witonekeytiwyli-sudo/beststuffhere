            z-index: 1;

        .modal-body {

        }

        .preview-media {

                border-radius: 28px;
            }
        }
    </style>
</head>

                previewTitle.textContent = data.name || 'Preview';
                previewContent.innerHTML = '';
                const url = data.url;
                if (isVideoUrl(url)) {

                const v = previewContent.querySelector('video');
                if (v) { v.pause();
                    v.currentTime = 0; }
            }

            // --------------------------------------------------------------
            // 5. EVENT DELEGATION
            // --------------------------------------------------------------
            document.addEventListener('click', function(e) {
                // Preview button
                const previewBtn = e.target.closest('.btn-preview');
                if (previewBtn) {
                    e.preventDefault();
                    const dataAttr = previewBtn.getAttribute('data-preview');
                    if (dataAttr) {
                        try { openPreview(JSON.parse(dataAttr)); } catch (_) {}
                    }
                    return;
                }

                // Buy now button → direct to Telegram DM with product info
                const buyBtn = e.target.closest('.btn-buy');
                if (buyBtn) {
                    e.preventDefault();
                    const dataAttr = buyBtn.getAttribute('data-product');
                    if (dataAttr) {
                        try {
                            const prodData = JSON.parse(dataAttr);
                            const fullProduct = products.find(p => p.id === prodData.id);
                            const target = fullProduct || prodData;
                            const message = buildPurchaseMessage(target);
                            openTelegramDM(message);
                        } catch (_) {}
                    }
                    return;
                }

                // Close preview on overlay click
                if (e.target === previewModal) closePreviewModal();
            });

            // ESC to close preview
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (previewModal.classList.contains('active')) closePreviewModal();
                }
            });

            closePreview.addEventListener('click', closePreviewModal);

            console.log('✨ ÆON store loaded · Buy now → direct Telegram DM with product info ✅');
        })();
    </script>

</body>
</html>
